<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Preview</title>
    <link rel="stylesheet" href="/web/styles.css" />
  </head>
  <body>
    <header class="site-header" role="banner">
      <h1>Book Preview</h1>
      <p>Markdown rendering with browser pagination support.</p>
    </header>

    <main id="content" aria-label="Book content">
      <article id="book" class="chapter-container" aria-live="polite"></article>
    </main>

    <footer class="site-footer" role="contentinfo">
      <small>Rendered with markdown-it + paged.js polyfill.</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-footnote@4.0.0/dist/markdown-it-footnote.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-attrs@4.1.6/markdown-it-attrs.browser.js"></script>
    <script>
      window.PagedConfig = {
        auto: false,
      };
    </script>
    <script src="https://unpkg.com/pagedjs/dist/paged.polyfill.js"></script>
    <script src="/web/main.js" type="module"></script>
  </body>
</html>
